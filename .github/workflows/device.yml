name: Desktop Build

on:
  push:
    branches: [main, convert-to-tauri]
    paths:
      - "app/desktop/**"
      # zcrypt-core is compiled into the shell (path dependency).
      - "app/core/**"
      - "app/frontend/**"
      - ".github/workflows/desktop.yml"
    # Version tags publish the built installers to the matching GitHub Release.
    # (branches/paths filters are not evaluated for tag pushes.)
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - "app/desktop/**"
      - "app/core/**"
      - "app/frontend/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

# Needed by the tag-triggered publish step to upload assets to the release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ── System deps (Linux only) ──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      # ── Toolchains ──
      # The engine (zcrypt-core) is pure Rust and compiled into the Tauri shell
      # in-process — the old Go sidecar subprocess is gone.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            app/desktop/src-tauri
            app/core

      # ── Fast Rust gate (Linux leg only — one leg is enough for lints) ──
      # Runs before the expensive frontend export + bundle. src-tauri/build.rs
      # seeds a placeholder frontend-dist when the real export isn't present,
      # so fmt/clippy never need a Next.js build. Mirrors the prepush desktop
      # gate (cargo fmt --check + clippy -D warnings; clippy subsumes check).
      - name: Rust lint (fmt + clippy)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: app/desktop/src-tauri
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings

      - uses: oven-sh/setup-bun@v2

      # ── Build frontend static export ──
      - name: Install frontend dependencies
        working-directory: app/frontend
        run: bun install --frozen-lockfile

      # Remove web-only dynamic routes before static export — Next.js App Router
      # requires generateStaticParams for every [param] route in output:export
      # mode, but these pages (share/pad/send) are web-only and get stripped
      # from frontend-dist anyway. Deleting them pre-build is the only reliable
      # way to skip them in Next.js 16 Turbopack.
      # Remove web-only and unresolvable dynamic routes before static export.
      # Next.js 16 Turbopack can't detect generateStaticParams through a client
      # component import boundary, so we delete these route folders pre-build.
      # The desktop app doesn't use any of these pages.
      - name: Remove web-only dynamic routes for desktop export
        shell: bash
        run: |
          rm -rf app/frontend/app/s
          rm -rf "app/frontend/app/pad/[token]"
          rm -rf "app/frontend/app/send/[token]"
          rm -rf "app/frontend/app/(app)/admin/users/[id]"

      - name: Build frontend
        working-directory: app/frontend
        env:
          NEXT_OUTPUT_EXPORT: "1"
          NEXT_TELEMETRY_DISABLED: "1"
          # Baked into the static export — the desktop app has no Next.js
          # rewrites, so it must talk to the live backend directly. Public value
          # (already exposed in the web bundle), not a secret.
          NEXT_PUBLIC_API_URL: "https://zcrypt-production-f608.up.railway.app"
        run: bun run build

      - name: Prepare frontend-dist
        shell: bash
        run: |
          rm -rf app/desktop/frontend-dist
          # next.config.ts sets output:"export" + distDir:".next-export", so the
          # static HTML is written directly into .next-export (no nested out/).
          cp -r app/frontend/.next-export app/desktop/frontend-dist

          # Strip marketing-only pages not needed in the desktop app
          cd app/desktop/frontend-dist
          rm -rf docs philosophy privacy terms tui pricing pad s send transfer demo features vs
          rm -f sitemap.xml robots.txt opengraph-image* twitter-image*

          # Redirect root → /login
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=/login"></head>
          <body></body>
          </html>
          HTMLEOF

      # On tag pushes, stamp the bundle version from the tag (e.g. v0.1.1 →
      # 0.1.1) so installers and the release version match without hand-editing
      # tauri.conf.json. jq is preinstalled on all GitHub-hosted runners.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          cd app/desktop/src-tauri
          tmp=$(mktemp)
          jq --arg v "$VER" '.version = $v' tauri.conf.json > "$tmp" && mv "$tmp" tauri.conf.json
          echo "tauri version set to $VER"

      # ── Tauri CLI + build ──
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # ── Updater artifact signing (optional, gated on secrets) ──
      # `cargo tauri build` only signs updater bundles (macOS .app.tar.gz,
      # Windows .msi/.exe, Linux .AppImage) when BOTH of these are true:
      #   1. TAURI_SIGNING_PRIVATE_KEY(_PASSWORD) are non-empty here, and
      #   2. app/desktop/src-tauri/tauri.conf.json has `bundle.createUpdaterArtifacts: true`
      #      and a `plugins.updater.pubkey` + `endpoints` configured.
      # Neither is set up yet (tauri.conf.json is out of scope for this change —
      # see blocked_on). Until then these env vars are empty and signing is a
      # silent no-op: the build still succeeds and produces unsigned installers,
      # exactly like before this step existed.
      #
      # One-time human setup to turn signing on:
      #   1. `cargo tauri signer generate -w ~/.tauri/zcrypt.key`
      #   2. Add repo secrets TAURI_SIGNING_PRIVATE_KEY (contents of the .key
      #      file) and TAURI_SIGNING_PRIVATE_KEY_PASSWORD.
      #   3. Put the printed public key + updater endpoint(s) into
      #      tauri.conf.json's `plugins.updater` block, and set
      #      `bundle.createUpdaterArtifacts: true`.
      - name: Build Tauri app
        working-directory: app/desktop/src-tauri
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      # ── Upload artifacts ──
      # .sig globs below only ever match when updater signing is configured
      # (see the "Build Tauri app" step); upload-artifact warns-not-fails on
      # unmatched glob entries as long as at least one path in the list hits.
      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zcrypt-windows-${{ matrix.target }}
          path: |
            app/desktop/src-tauri/target/release/bundle/msi/*.msi
            app/desktop/src-tauri/target/release/bundle/msi/*.msi.sig
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: zcrypt-macos-${{ matrix.target }}
          path: |
            app/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            app/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            app/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: zcrypt-linux-${{ matrix.target }}
          path: |
            app/desktop/src-tauri/target/release/bundle/deb/*.deb
            app/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            app/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
            app/desktop/src-tauri/target/release/bundle/rpm/*.rpm

      # ── Publish installers to the GitHub Release (tag pushes only) ──
      # GoReleaser (release.yml) creates the release and owns its notes; this
      # step waits for that release to exist, then appends this platform's
      # installers. Each matrix leg uploads only the files it built. Filenames
      # don't collide with GoReleaser's TUI tarballs, so they coexist.
      - name: Publish installers to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Wait (up to ~5 min) for GoReleaser to create the release so we never
          # race it for ownership of the tag.
          for i in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "release $TAG exists"; break
            fi
            echo "waiting for release $TAG ($i/30)…"; sleep 10
          done
          shopt -s nullglob
          files=(
            app/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe
            app/desktop/src-tauri/target/release/bundle/msi/*.msi
            app/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            app/desktop/src-tauri/target/release/bundle/deb/*.deb
            app/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            # Updater signatures — only present when signing is configured
            # (see the "Build Tauri app" step). latest.json (built by the
            # publish-updater-manifest job below) embeds their contents
            # directly, but publishing the raw .sig files too makes them easy
            # to spot-check on the release page.
            app/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            app/desktop/src-tauri/target/release/bundle/msi/*.msi.sig
            app/desktop/src-tauri/target/release/bundle/appimage/*.AppImage.sig
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no installer files found for this platform"; exit 0
          fi
          printf 'uploading: %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber

  # ── Gate: is updater signing configured? ─────────────────────────────────────
  # The `secrets` context isn't available in `jobs.<job_id>.if` (only in `env:`
  # blocks), so we can't write `if: secrets.X != ''` directly on the job below.
  # This tiny job reads the secret through `env:` (which *does* have `secrets`)
  # and republishes it as a job output, which `if:` *can* read via `needs`.
  check-updater-signing:
    name: Check updater signing secret
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check for TAURI_SIGNING_PRIVATE_KEY
        id: check
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Updater manifest (tag pushes, signing configured only) ──────────────────
  # Builds the Tauri updater's latest.json from each platform's .sig sidecar
  # (uploaded as part of the `build` matrix above) and attaches it to the
  # release, so the desktop app's built-in updater has something to poll.
  #
  # Fully gated on TAURI_SIGNING_PRIVATE_KEY (via check-updater-signing above):
  # if it isn't set, this job — and therefore the whole updater-manifest step —
  # is skipped and the release is published exactly as it is today (installers,
  # no latest.json). It also self-skips (see "Build updater manifest" below) if
  # the secret is set but tauri.conf.json's `plugins.updater` /
  # `bundle.createUpdaterArtifacts` haven't been configured yet, since in that
  # case `cargo tauri build` never actually produced any .sig files to work with.
  publish-updater-manifest:
    name: Publish updater manifest
    needs: [build, check-updater-signing]
    if: startsWith(github.ref, 'refs/tags/v') && needs.check-updater-signing.outputs.configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download platform build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: zcrypt-*
          path: artifacts

      - name: Build updater manifest (latest.json)
        id: manifest
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          json=$(jq -n --arg v "$VER" --arg d "$PUB_DATE" \
            '{version: $v, notes: "See the GitHub release notes for details.", pub_date: $d, platforms: {}}')

          shopt -s nullglob
          for dir in artifacts/zcrypt-*; do
            name="$(basename "$dir")"
            # Artifact names are "zcrypt-<os>-<rust-target-triple>" (set by the
            # build matrix above), e.g. zcrypt-macos-aarch64-apple-darwin,
            # zcrypt-windows-x86_64-pc-windows-msvc. Map the triple to the
            # target key the Tauri updater expects (OS-ARCH).
            case "$name" in
              *aarch64-apple-darwin) platform="darwin-aarch64" ;;
              *x86_64-apple-darwin) platform="darwin-x86_64" ;;
              *x86_64-pc-windows-msvc) platform="windows-x86_64" ;;
              *x86_64-unknown-linux-gnu) platform="linux-x86_64" ;;
              *) echo "no updater platform mapping for '$name' — skipping"; continue ;;
            esac

            sig_file="$(find "$dir" -name '*.sig' | head -n1)"
            if [ -z "$sig_file" ]; then
              echo "no .sig in $dir — skipping $platform"; continue
            fi

            bundle_name="$(basename "${sig_file%.sig}")"
            url="https://github.com/${REPO}/releases/download/${TAG}/${bundle_name}"
            signature="$(cat "$sig_file")"

            json=$(echo "$json" | jq --arg p "$platform" --arg u "$url" --arg s "$signature" \
              '.platforms[$p] = {url: $u, signature: $s}')
          done

          count="$(echo "$json" | jq '.platforms | length')"
          if [ "$count" -eq 0 ]; then
            echo "no signed updater artifacts found in any platform — tauri.conf.json's updater plugin is probably not configured yet; skipping latest.json"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "$json" | jq . > latest.json
            cat latest.json
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish latest.json to release
        if: steps.manifest.outputs.found == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" latest.json --repo "$GITHUB_REPOSITORY" --clobber
