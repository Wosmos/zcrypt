name: Desktop Build

on:
  push:
    branches: [main, convert-to-tauri]
    paths:
      - "app/desktop/**"
      - "app/frontend/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/desktop/**"
      - "app/frontend/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

env:
  GO_VERSION: "1.25"
  BUN_VERSION: "latest"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar: zcrypt-sidecar-x86_64-pc-windows-msvc.exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar: zcrypt-sidecar-aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            sidecar: zcrypt-sidecar-x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar: zcrypt-sidecar-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ── System deps (Linux only) ──
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── Toolchains ──
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: app/desktop/sidecar/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/desktop/src-tauri

      - uses: oven-sh/setup-bun@v2

      # ── Build Go sidecar ──
      - name: Build sidecar
        working-directory: app/desktop/sidecar
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o ../src-tauri/${{ matrix.sidecar }} .

      # ── Build frontend static export ──
      - name: Install frontend dependencies
        working-directory: app/frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: app/frontend
        run: bun run build
        env:
          NEXT_OUTPUT_EXPORT: "1"

      - name: Prepare frontend-dist
        shell: bash
        run: |
          rm -rf app/desktop/frontend-dist
          cp -r app/frontend/.next-export/out app/desktop/frontend-dist

          # Strip marketing pages
          cd app/desktop/frontend-dist
          rm -rf docs philosophy privacy terms tui pricing pad s send transfer demo
          rm -f sitemap.xml robots.txt opengraph-image* twitter-image*

          # Redirect root to /login
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=/login"></head>
          <body></body>
          </html>
          HTMLEOF

      # ── Install Tauri CLI & build ──
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri app
        working-directory: app/desktop/src-tauri
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # ── Upload artifacts ──
      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: zcrypt-windows
          path: |
            app/desktop/src-tauri/target/release/bundle/msi/*.msi
            app/desktop/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: zcrypt-macos-${{ matrix.target }}
          path: |
            app/desktop/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: zcrypt-linux
          path: |
            app/desktop/src-tauri/target/release/bundle/deb/*.deb
            app/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
