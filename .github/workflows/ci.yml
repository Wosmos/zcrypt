name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download dependencies
        working-directory: app/backend
        run: go mod download

      - name: Vet
        working-directory: app/backend
        run: go vet ./...

      - name: Build
        working-directory: app/backend
        run: go build -o zpush-server .

      - name: Test
        working-directory: app/backend
        run: go test ./...

  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Lint
        working-directory: app/frontend
        run: npm run lint

      - name: Build
        working-directory: app/frontend
        run: npm run build
