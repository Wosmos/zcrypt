name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        working-directory: app/backend
        run: go mod download

      - name: Vet
        working-directory: app/backend
        run: go vet ./...

      - name: Build
        working-directory: app/backend
        run: go build -o zcrypt-server .

      - name: Test
        working-directory: app/backend
        run: go test ./...

  frontend:
    name: Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: app/frontend
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: app/frontend
        run: bunx tsc --noEmit

      - name: Lint
        working-directory: app/frontend
        run: bun run lint

      - name: Build
        working-directory: app/frontend
        run: bun run build
