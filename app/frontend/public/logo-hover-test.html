<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Hover Animation Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090b;
    color: #fafafa;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 64px;
  }

  h2 {
    font-size: 11px;
    color: #00d5e4;
    text-transform: uppercase;
    letter-spacing: 5px;
    text-align: center;
  }

  .label {
    font-size: 10px;
    color: #3f3f46;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-align: center;
    margin-top: 14px;
  }

  .demo-row {
    display: flex;
    gap: 80px;
    align-items: flex-start;
  }

  .demo-col { text-align: center; }

  .section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* ════════════════════════════════════
     BASE ICON
     ════════════════════════════════════ */
  .icon {
    position: relative;
    flex-shrink: 0;
    perspective: 600px;
    transform-style: preserve-3d;
    cursor: pointer;
  }

  .icon .shadow {
    position: absolute;
    border-radius: 10px;
    background: rgba(0, 147, 163, 0.15);
    filter: blur(10px);
    transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
  }

  .icon .back {
    position: absolute;
    border-radius: 10px;
    background: linear-gradient(145deg, #008a97, #006d77);
    box-shadow: -2px 3px 10px rgba(0, 0, 0, 0.5);
    transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
  }

  .icon .front {
    position: absolute;
    border-radius: 10px;
    background: linear-gradient(145deg, #00e8f8, #00c5d4);
    box-shadow:
      -6px 6px 24px rgba(0, 0, 0, 0.35),
      0 1px 0 rgba(255, 255, 255, 0.15) inset;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.5s cubic-bezier(0.33, 1, 0.68, 1);
    overflow: hidden;
  }

  .icon .front span {
    font-weight: 700;
    color: #09090b;
    line-height: 1;
    transition: transform 0.5s cubic-bezier(0.33, 1, 0.68, 1);
  }

  /* Glassy shine pseudo-element on front plane */
  .icon .front::after {
    content: "";
    position: absolute;
    top: -50%;
    left: -60%;
    width: 40%;
    height: 200%;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(255, 255, 255, 0.08) 45%,
      rgba(255, 255, 255, 0.25) 50%,
      rgba(255, 255, 255, 0.08) 55%,
      transparent 70%
    );
    transform: skewX(-15deg);
    transition: left 0.6s cubic-bezier(0.33, 1, 0.68, 1);
    pointer-events: none;
  }

  .icon:hover .front::after {
    left: 120%;
  }

  /* ════════════════════════════════════
     VARIANT A — MERGE (layers come together)
     ════════════════════════════════════ */

  /* Large (88px) */
  .icon.lg { width: 88px; height: 88px; }
  .icon.lg .shadow { width: 50px; height: 50px; top: 24px; left: 18px; }
  .icon.lg .back {
    width: 50px; height: 50px; top: 4px; left: 0;
    transform: rotateY(-14deg) rotateX(7deg) translateZ(-8px);
  }
  .icon.lg .front {
    width: 50px; height: 50px; top: 18px; left: 28px;
    transform: rotateY(-9deg) rotateX(4deg) translateZ(8px);
  }
  .icon.lg .front span { font-size: 26px; }

  .merge .icon.lg:hover .back {
    transform: rotateY(-4deg) rotateX(2deg) translateZ(-2px);
    top: 10px; left: 10px;
  }
  .merge .icon.lg:hover .front {
    transform: rotateY(-4deg) rotateX(2deg) translateZ(2px);
    top: 14px; left: 22px;
  }
  .merge .icon.lg:hover .shadow {
    filter: blur(16px);
    background: rgba(0, 213, 228, 0.22);
    top: 18px; left: 14px;
  }

  /* Medium (56px) */
  .icon.md { width: 56px; height: 56px; }
  .icon.md .shadow { width: 32px; height: 32px; top: 15px; left: 12px; }
  .icon.md .back {
    width: 32px; height: 32px; top: 2px; left: 0;
    transform: rotateY(-14deg) rotateX(7deg) translateZ(-5px);
  }
  .icon.md .front {
    width: 32px; height: 32px; top: 12px; left: 18px;
    transform: rotateY(-9deg) rotateX(4deg) translateZ(5px);
  }
  .icon.md .front span { font-size: 16px; }

  .merge .icon.md:hover .back {
    transform: rotateY(-4deg) rotateX(2deg) translateZ(-1px);
    top: 6px; left: 6px;
  }
  .merge .icon.md:hover .front {
    transform: rotateY(-4deg) rotateX(2deg) translateZ(1px);
    top: 9px; left: 14px;
  }
  .merge .icon.md:hover .shadow {
    filter: blur(12px);
    background: rgba(0, 213, 228, 0.2);
  }

  /* Small (36px) */
  .icon.sm { width: 36px; height: 36px; }
  .icon.sm .shadow { width: 21px; height: 21px; top: 10px; left: 8px; }
  .icon.sm .back {
    width: 21px; height: 21px; top: 1px; left: 0;
    transform: rotateY(-14deg) rotateX(7deg) translateZ(-3px);
  }
  .icon.sm .front {
    width: 21px; height: 21px; top: 8px; left: 12px;
    transform: rotateY(-9deg) rotateX(4deg) translateZ(3px);
  }
  .icon.sm .front span { font-size: 10px; }

  .merge .icon.sm:hover .back {
    transform: rotateY(-4deg) rotateX(2deg) translateZ(-1px);
    top: 4px; left: 4px;
  }
  .merge .icon.sm:hover .front {
    transform: rotateY(-4deg) rotateX(2deg) translateZ(1px);
    top: 6px; left: 9px;
  }
  .merge .icon.sm:hover .shadow {
    filter: blur(10px);
    background: rgba(0, 213, 228, 0.2);
  }


  /* ════════════════════════════════════
     VARIANT B — GLASSY SHINE (shine sweeps + subtle lift)
     ════════════════════════════════════ */

  .glassy .icon .front::after {
    left: -60%;
    width: 50%;
    background: linear-gradient(
      105deg,
      transparent 25%,
      rgba(255, 255, 255, 0.05) 40%,
      rgba(255, 255, 255, 0.35) 50%,
      rgba(255, 255, 255, 0.05) 60%,
      transparent 75%
    );
    transition: left 0.7s cubic-bezier(0.33, 1, 0.68, 1);
  }

  .glassy .icon:hover .front::after {
    left: 130%;
  }

  /* Subtle lift + glow intensify on hover */
  .glassy .icon.lg:hover .front {
    transform: rotateY(-9deg) rotateX(4deg) translateZ(12px);
    box-shadow:
      -8px 8px 30px rgba(0, 0, 0, 0.4),
      0 1px 0 rgba(255, 255, 255, 0.2) inset,
      0 0 20px rgba(0, 213, 228, 0.15);
  }
  .glassy .icon.lg:hover .back {
    transform: rotateY(-14deg) rotateX(7deg) translateZ(-12px);
    box-shadow: -2px 3px 14px rgba(0, 0, 0, 0.6);
  }
  .glassy .icon.lg:hover .shadow {
    filter: blur(18px);
    background: rgba(0, 213, 228, 0.25);
  }

  .glassy .icon.md:hover .front {
    transform: rotateY(-9deg) rotateX(4deg) translateZ(8px);
    box-shadow:
      -6px 6px 24px rgba(0, 0, 0, 0.4),
      0 1px 0 rgba(255, 255, 255, 0.2) inset,
      0 0 14px rgba(0, 213, 228, 0.12);
  }
  .glassy .icon.md:hover .back {
    transform: rotateY(-14deg) rotateX(7deg) translateZ(-8px);
  }
  .glassy .icon.md:hover .shadow {
    filter: blur(14px);
    background: rgba(0, 213, 228, 0.22);
  }

  .glassy .icon.sm:hover .front {
    transform: rotateY(-9deg) rotateX(4deg) translateZ(5px);
    box-shadow:
      -4px 4px 18px rgba(0, 0, 0, 0.4),
      0 1px 0 rgba(255, 255, 255, 0.2) inset,
      0 0 10px rgba(0, 213, 228, 0.1);
  }
  .glassy .icon.sm:hover .back {
    transform: rotateY(-14deg) rotateX(7deg) translateZ(-5px);
  }
  .glassy .icon.sm:hover .shadow {
    filter: blur(10px);
    background: rgba(0, 213, 228, 0.2);
  }


  /* ════════════════════════════════════
     LIGHT MODE
     ════════════════════════════════════ */
  .light {
    background: #fafafa;
    padding: 40px 60px;
    border-radius: 16px;
  }
  .light .icon .back {
    background: linear-gradient(145deg, #b2ecf0, #80dde4);
    box-shadow: -2px 3px 10px rgba(0, 0, 0, 0.06);
  }
  .light .icon .front {
    background: linear-gradient(145deg, #00d5e4, #00b5c4);
    box-shadow:
      -4px 4px 16px rgba(0, 0, 0, 0.08),
      0 1px 0 rgba(255, 255, 255, 0.3) inset;
  }
  .light .icon .front span { color: #fff; }
  .light .icon .shadow { background: rgba(0, 147, 163, 0.06); }
  .light .icon .front::after {
    background: linear-gradient(
      105deg,
      transparent 25%,
      rgba(255, 255, 255, 0.15) 40%,
      rgba(255, 255, 255, 0.5) 50%,
      rgba(255, 255, 255, 0.15) 60%,
      transparent 75%
    );
  }

  hr {
    width: 200px;
    border: none;
    border-top: 1px solid #18181b;
  }
</style>
</head>
<body>

<!-- ═══ VARIANT A: MERGE ═══ -->
<h2>Variant A &mdash; Merge</h2>
<p class="label" style="margin-top:-16px;color:#52525b">Layers come together + glassy sweep</p>

<div class="section merge">
  <div class="demo-row">
    <div class="demo-col">
      <div class="icon lg">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <p class="label">Large</p>
    </div>
    <div class="demo-col">
      <div class="icon md">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <p class="label">Medium</p>
    </div>
    <div class="demo-col">
      <div class="icon sm">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <p class="label">Small</p>
    </div>
  </div>

  <!-- Light -->
  <div class="light">
    <div class="demo-row" style="gap:40px">
      <div class="icon lg">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <div class="icon md">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <div class="icon sm">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
    </div>
  </div>
</div>

<hr>

<!-- ═══ VARIANT B: GLASSY SHINE ═══ -->
<h2>Variant B &mdash; Glassy Shine</h2>
<p class="label" style="margin-top:-16px;color:#52525b">Layers push apart + bright glass sweep + cyan glow</p>

<div class="section glassy">
  <div class="demo-row">
    <div class="demo-col">
      <div class="icon lg">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <p class="label">Large</p>
    </div>
    <div class="demo-col">
      <div class="icon md">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <p class="label">Medium</p>
    </div>
    <div class="demo-col">
      <div class="icon sm">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <p class="label">Small</p>
    </div>
  </div>

  <!-- Light -->
  <div class="light">
    <div class="demo-row" style="gap:40px">
      <div class="icon lg">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <div class="icon md">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
      <div class="icon sm">
        <div class="shadow"></div>
        <div class="back"></div>
        <div class="front"><span>z</span></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
