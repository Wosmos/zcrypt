<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZPush | Vault Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #030712; color: white; }
        .glass-card {
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .glass-card:hover { border-color: rgba(16, 185, 129, 0.3); background: rgba(17, 24, 39, 0.6); }
        .mesh-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% -20%, #064e3b 0%, transparent 50%),
                        radial-gradient(circle at 0% 100%, #1e1b4b 0%, transparent 40%);
        }
    </style>
</head>
<body class="min-h-screen flex">
    <div class="mesh-gradient"></div>

    <aside class="w-64 border-r border-white/5 p-6 flex flex-col hidden lg:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div>
            <span class="font-bold text-xl tracking-tight">zpush</span>
        </div>
        <nav class="space-y-2 flex-1">
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/10 text-emerald-400 font-medium">Vault</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all">Settings</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-white/5 hover:text-white transition-all">Admin</a>
        </nav>
        <div class="mt-auto p-4 glass-card rounded-2xl text-xs text-gray-500">
            <p>Storage: 138.8 MB / 275 GB</p>
            <div class="w-full h-1 bg-white/5 rounded-full mt-2 overflow-hidden">
                <div class="w-[40%] h-full bg-emerald-500"></div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-6 lg:p-10 overflow-y-auto">
        <header class="flex justify-between items-end mb-10">
            <div>
                <span class="text-emerald-500 text-xs font-bold uppercase tracking-widest">Encrypted Storage</span>
                <h1 class="text-4xl font-bold mt-1">My Vault</h1>
            </div>
            <div class="flex gap-2">
                <button class="p-3 glass-card rounded-xl hover:scale-105 active:scale-95 transition-all">🔔</button>
                <button class="p-3 glass-card rounded-xl hover:scale-105 active:scale-95 transition-all">🔄</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-5 auto-rows-[110px]">
            
            <div class="md:col-span-4 row-span-2 glass-card rounded-[2rem] p-8 flex flex-col justify-between overflow-hidden relative">
                <div class="relative z-10 flex justify-between items-start">
                    <div>
                        <h2 class="text-5xl font-bold">138.8 <span class="text-xl text-gray-500">MB</span></h2>
                        <p class="text-gray-400 mt-1">of 275.1 GB total storage used</p>
                    </div>
                    <div class="text-right">
                        <span class="text-emerald-400 text-sm font-bold">+12% this week</span>
                    </div>
                </div>
                <div class="relative z-10">
                    <div class="flex gap-1 h-3 w-full bg-white/5 rounded-full p-0.5 overflow-hidden">
                        <div class="w-[30%] bg-blue-500 rounded-full"></div>
                        <div class="w-[15%] bg-emerald-500 rounded-full"></div>
                        <div class="w-[5%] bg-purple-500 rounded-full"></div>
                    </div>
                    <div class="flex gap-4 mt-4 text-[10px] text-gray-500 font-bold uppercase">
                        <span class="flex items-center gap-1"><i class="w-2 h-2 bg-blue-500 rounded-full"></i> Docs</span>
                        <span class="flex items-center gap-1"><i class="w-2 h-2 bg-emerald-500 rounded-full"></i> Images</span>
                        <span class="flex items-center gap-1"><i class="w-2 h-2 bg-purple-500 rounded-full"></i> Videos</span>
                    </div>
                </div>
                <div class="absolute -right-10 -top-10 w-64 h-64 bg-emerald-500/10 blur-[80px] rounded-full"></div>
            </div>

            <div class="md:col-span-2 row-span-1 glass-card rounded-[2rem] p-6 flex flex-col justify-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Files</p>
                <p class="text-3xl font-bold">106 <span class="text-sm text-gray-600 font-normal">chunks</span></p>
            </div>

            <div class="md:col-span-2 row-span-1 glass-card rounded-[2rem] p-6 flex flex-col justify-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Space Saved</p>
                <p class="text-3xl font-bold text-emerald-400">222.1 MB</p>
            </div>

            <div class="md:col-span-4 row-span-3 glass-card rounded-[2.5rem] p-8">
                <div class="flex justify-between items-center mb-10">
                    <h3 class="text-xl font-bold">Upload Activity</h3>
                    <select class="bg-white/5 border border-white/10 rounded-lg px-3 py-1 text-xs outline-none">
                        <option>Last 7 Days</option>
                    </select>
                </div>
                <div class="w-full h-48 flex items-end gap-2 group">
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 40%"></div>
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 65%"></div>
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 45%"></div>
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 90%"></div>
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 30%"></div>
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 55%"></div>
                    <div class="flex-1 bg-emerald-500/20 hover:bg-emerald-500 transition-all rounded-t-lg" style="height: 75%"></div>
                </div>
            </div>

            <div class="md:col-span-2 row-span-3 glass-card rounded-[2.5rem] p-8 flex flex-col justify-between">
                <h3 class="text-xl font-bold">By File Type</h3>
                <div class="relative w-40 h-40 mx-auto my-6">
                    <svg viewBox="0 0 36 36" class="w-full h-full transform -rotate-90">
                        <circle cx="18" cy="18" r="15.9" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="3"></circle>
                        <circle cx="18" cy="18" r="15.9" fill="transparent" stroke="#10b981" stroke-width="3" stroke-dasharray="60, 100"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-2xl font-bold">60%</span>
                        <span class="text-[10px] text-gray-500 uppercase font-bold">Images</span>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Videos</span>
                        <span class="font-bold">133.3 MB</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-400">Documents</span>
                        <span class="font-bold">372.3 KB</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // Micro-interactions
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                // Potential for JS animations (like parallax) here
            });
        });
    </script>
</body>
</html>
