version: 2

project_name: zcrypt

before:
  hooks:
    - go -C app/tui mod download

builds:
  - id: zcrypt
    dir: app/tui
    main: .
    binary: zcrypt
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    format: tar.gz
    name_template: "zcrypt_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
  # Group the auto-generated release notes by conventional-commit type.
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Other changes
      order: 999

release:
  github:
    owner: Wosmos
    name: zcrypt
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

# Homebrew + Scoop tap publishing is disabled until a valid HOMEBREW_TAP_TOKEN
# is set. With an invalid/expired token GoReleaser returns 401 on the tap repos
# and fails the whole release (which also blocked the npm-publish job). To
# re-enable: create a PAT with access to Wosmos/homebrew-zcrypt and
# Wosmos/scoop-zcrypt, set it as the HOMEBREW_TAP_TOKEN secret, then restore the
# `brews:` and `scoops:` blocks (preferably migrated to `homebrew_casks:`).
